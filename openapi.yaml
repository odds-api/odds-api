          - type: 'null'
          title: P50 Ms
        p95_ms:
          anyOf:
          - type: number
          - type: 'null'
          title: P95 Ms
        p99_ms:
          anyOf:
          - type: number
          - type: 'null'
          title: P99 Ms
        error_rate_pct:
          anyOf:
          - type: number
          - type: 'null'
          title: Error Rate Pct
      type: object
      title: PublicStatusMetrics
    PublicStatusRateLimits:
      properties:
        status:
          type: string
          title: Status
