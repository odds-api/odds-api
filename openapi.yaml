openapi: 3.1.0
info:
  title: Odds API
  description: 'The Odds API V1 provides sports and racing events, bookmaker odds,
    live price updates, betting opportunity

    snapshots, and result lookups for production integrations.


    Authenticate every request with `X-API-Key: <your_api_key>` unless an endpoint
    explicitly states it is public.

    Use `https://api.odds-api.net/v1` as the production base URL.


    Snapshot endpoints return JSON and include timestamps or resume tokens when live
    updates are available.

    `/stream` endpoints use Server-Sent Events (`text/event-stream`) and `/ws` endpoints
    use WebSockets. Stream

    messages use the same shape in both transports: an event name such as `delta`,
    `heartbeat`, or `resync`, plus a

    JSON payload. Store the latest `resume` value and pass it back as `since` after
    reconnecting.


    Production clients should start with catalog discovery, page event lists with
    `limit` and `cursor`, fetch odds

    snapshots for initial state, then use streams for hot events. Recommended starting
    polling intervals are:

    catalog metadata every 6-24 hours, sports event lists every 5-15 minutes, racing
    event lists every 1-5 minutes,

    odds snapshots every 60-120 seconds when streams are not used, betting opportunity
    snapshots every 30-120 seconds,

    and results every 1-5 minutes after the event starts until settled.


    Handle HTTP 429 by honoring `Retry-After` when present, otherwise use jittered
    exponential backoff. Use

    `/usage` to detect monthly API-credit quota exhaustion and `/limits` to discover
    response, stream, add-on, and

    plan caps. Most standard API calls use 1 credit; large odds snapshots, history,
    broad aggregate feeds, and

    support-approved betting feeds may use multiple credits as weighted metering rolls
    out. Cache snapshots by request

    shape, respect `ttl_seconds` when present, display `as_of_ts_ms`, and keep the
    most recent `resume` token with

    cached state. On stream disconnect, reconnect with `since=<last_resume>` and `catchup=true`;
    on `resync`, reload

    the snapshot before applying more deltas.


    Odds can change quickly. Check `as_of_ts_ms`, handle empty arrays, suspended selections,
    rate limits, and stale

    prices before displaying or acting on any betting data.


    New odds-api.net API keys default to a compact response shape that keeps essential
    IDs, prices, teams, markets,

    timestamps, and resume tokens while omitting raw payloads, source metadata, internal/debug
    IDs, bookmaker links,

    and non-offered price columns. Existing API keys keep the historical full response
    shape unless they explicitly

    pass the compacting query flags. There is no public `profile` parameter; use the
    documented per-field flags when

    you need to opt a compact client back into a specific field group.'
  version: 1.0.0
  license:
    name: Proprietary
    url: https://odds-api.net
  x-workflow-examples:
  - name: positive_ev_request
    summary: Find positive EV bets for a league.
    steps:
    - GET /v1/events?sport=rugby-league&league=NRL
    - GET /v1/bets/snapshot?strategies=pos_ev
    - Use response timestamps and stake/risk controls before showing user-facing picks.
  - name: arbitrage_request
    summary: Find arbitrage opportunities across allowed bookmakers.
    steps:
    - GET /v1/bookmakers
    - GET /v1/bets/snapshot?strategies=arbitrage
    - Show execution-risk caveats; never present arbitrage as guaranteed after limits,
      voids, or delays.
  - name: odds_history_request
    summary: Get line movement for a market.
    steps:
    - GET /v1/events/{event_id}/odds/snapshot
    - Pick a selection_key from an odds line.
    - GET /v1/events/{event_id}/odds/history?selection_key=...
  x-responsible-gambling: Do not present betting outcomes as risk-free. Always mention
    execution risk, stale prices, bookmaker limits, voids, delays, and jurisdictional
    availability in user-facing products.
  x-production-integration:
    recommended_flow:
    - Authenticate backend requests with X-API-Key.
    - Discover sports, leagues, and bookmakers before storing local filters.
    - Page sports or racing events with limit and cursor.
    - Fetch odds snapshots for initial state and persist as_of_ts_ms, ttl_seconds,
      next_cursor, and resume.
    - Use SSE or WebSocket streams for realtime updates and reconnect with since=<last_resume>.
    - Use history endpoints for line movement and results endpoints after events finish.
    recommended_polling_intervals:
      catalog_metadata: 6-24h
      sports_events: 5-15m, or 1-5m for active leagues and near-start windows
      racing_events: 1-5m with narrow time windows
      odds_snapshots_without_streams: 60-120s, or 15-30s for priority events with
        strict quota controls
      betting_opportunity_snapshots: 30-120s depending on alert urgency
      results_after_start: 1-5m until settled, then back off
    stream_reconnects:
    - Snapshot first, then connect to /stream or /ws with matching filters.
    - Apply delta messages idempotently and persist the newest resume token.
    - Use heartbeat messages as liveness checks.
    - Reconnect with jittered exponential backoff and since=<last_resume>.
    - Reload the snapshot when a resync message indicates the resume token is unavailable.
    rate_limit_backoff:
    - Honor Retry-After on 429 when present.
    - Otherwise start around 2 seconds and double up to about 60 seconds with jitter.
    - Use X-RateLimit-* response headers when present to tune callers.
    - Use /usage to detect monthly API-credit quota exhaustion and stop retry loops.
    cache_strategy:
    - Cache by endpoint path, event ID, normalized filters, page cursor, and product
      context.
    - Respect ttl_seconds when present and always surface as_of_ts_ms.
    - Use streams to update hot caches and reload snapshots after resync or parse
      failure.
    - Prefer stale-while-revalidate displays with a visible timestamp.
    failure_modes:
    - 400 invalid request shape, cursor, timestamp, or filter.
    - 401 missing or invalid API key.
    - 403 key lacks plan, product, bookmaker, stream, racing, or strategy access.
    - 404 event, race, result, or selection is unavailable.
    - 429 rate limit or monthly quota exhaustion.
    - 5xx transient service failure; retry with backoff and keep last good cached
      data marked stale.
    - Stream close or resync; reconnect with since or reload the snapshot.
paths:
  /:
    get:
      tags:
      - Start here
      summary: 'Start here: API metadata'
      operationId: root__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiRootResponse'
        '400': &id001
          description: Invalid request parameters or body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401': &id002
          description: Missing or invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403': &id003
          description: Credentials are valid but do not allow this resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404': &id004
          description: Resource was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429': &id005
          description: Rate limit exceeded.
          headers:
            Retry-After:
              description: Seconds to wait before retrying when supplied by the limiter.
              schema:
                type: integer
                minimum: 1
            X-RateLimit-Limit:
              description: Request bucket capacity for the active limiter bucket when
                supplied.
              schema:
                type: integer
            X-RateLimit-Remaining:
              description: Approximate remaining requests in the active limiter bucket
                when supplied.
              schema:
                type: integer
                minimum: 0
            X-RateLimit-Bucket:
              description: Limiter bucket name that produced the response when supplied.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitResponse'
        '500': &id006
          description: Unexpected server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      description: Returns the API name, version, OpenAPI document URL, and hosted
        reference URL.
      security: []
      x-rate-limit-note: Handle HTTP 429 with backoff and avoid tight polling loops.
  /status:
    get:
      tags:
      - Status
      summary: 'API status: Public health summary'
      operationId: public_status_status_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicStatusResponse'
              examples:
                default:
                  summary: 'API status: Public health summary'
                  value:
                    status: operational
                    as_of: '2026-04-29T10:25:00Z'
                    window_seconds: 300
                    components:
                    - id: rest_api
                      name: REST API
                      status: operational
                      metrics:
                        uptime_pct: 100.0
                        p50_ms: 24.0
                        p95_ms: 410.0
                        p99_ms: 846.0
                        error_rate_pct: 0.02
                    rate_limits:
                      status: operational
                      throttled_pct: 0.4
                    source:
                      fresh: true
                      age_seconds: 18
        '400': *id001
        '401': *id002
        '403': *id003
        '404': *id004
        '429': *id005
        '500': *id006
      description: Returns a sanitized public status summary for buyer-facing pages.
        The response includes recent component availability, latency percentiles,
        5xx error rate, stream health, and rate-limit health without exposing internal
        service names, infrastructure metrics, bookmaker details, raw traffic volume,
        or incident history.
      security: []
      x-rate-limit-note: Handle HTTP 429 with backoff and avoid tight polling loops.
