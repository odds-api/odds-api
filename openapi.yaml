          anyOf:
          - type: number
          - type: 'null'
          title: Throttled Pct
      type: object
      required:
      - status
      title: PublicStatusRateLimits
    PublicStatusResponse:
      properties:
        status:
          type: string
          title: Status
        as_of:
          type: string
          title: As Of
        window_seconds:
          type: integer
          title: Window Seconds
        components:
          items:
            $ref: '#/components/schemas/PublicStatusComponent'
          type: array
          title: Components
        rate_limits:
          $ref: '#/components/schemas/PublicStatusRateLimits'
        source:
          $ref: '#/components/schemas/PublicStatusSource'
      type: object
      required:
      - status
      - as_of
      - window_seconds
      - rate_limits
      - source
      title: PublicStatusResponse
    PublicStatusSource:
      properties:
        fresh:
          type: boolean
          title: Fresh
        age_seconds:
          anyOf:
          - type: integer
          - type: 'null'
          title: Age Seconds
      type: object
      required:
      - fresh
      title: PublicStatusSource
    RacingEventDetail:
      properties:
        event_id:
          type: string
          title: Event Id
        data:
          additionalProperties: true
          type: object
          title: Data
      type: object
      required:
      - event_id
      - data
      title: RacingEventDetail
    RacingEventListResponse:
      properties:
        items:
          items:
            $ref: '#/components/schemas/RacingEventSummary'
          type: array
          title: Items
        next_cursor:
          anyOf:
          - type: string
          - type: 'null'
          title: Next Cursor
        count:
          type: integer
          title: Count
      type: object
      required:
      - count
      title: RacingEventListResponse
    RacingEventSummary:
      properties:
        event_id:
          type: string
          title: Event Id
          description: Canonical racing event identifier (raceID).
        race_start_time:
          anyOf:
          - type: integer
          - type: 'null'
          title: Race Start Time
          description: Unix seconds.
        race_type:
          anyOf:
          - type: string
          - type: 'null'
          title: Race Type
        race_venue:
          anyOf:
          - type: string
          - type: 'null'
          title: Race Venue
        race_number:
          anyOf:
          - type: string
          - type: 'null'
          title: Race Number
        race_state:
          anyOf:
          - type: string
          - type: 'null'
          title: Race State
        race_country:
          anyOf:
          - type: string
          - type: 'null'
          title: Race Country
        race_distance:
          anyOf:
          - type: string
          - type: 'null'
          title: Race Distance
        active_runners:
          anyOf:
          - type: integer
          - type: 'null'
          title: Active Runners
        status:
          anyOf:
          - type: string
          - type: 'null'
          title: Status
        bookmaker_links:
          additionalProperties: true
          type: object
          title: Bookmaker Links
        scrapping_links:
          additionalProperties: true
          type: object
          title: Scrapping Links
        last_capture:
          anyOf:
          - type: integer
          - type: 'null'
          title: Last Capture
          description: Unix seconds.
      type: object
      required:
      - event_id
      title: RacingEventSummary
    RacingOddsBookmakerSnapshot:
      properties:
        bookmaker_name:
          type: string
          title: Bookmaker Name
        race_id:
          type: string
          title: Race Id
        status:
          anyOf:
          - type: string
          - type: 'null'
          title: Status
        updated_at_ts:
          anyOf:
          - type: integer
          - type: 'null'
          title: Updated At Ts
        payload:
          additionalProperties: true
          type: object
          title: Payload
      type: object
      required:
      - bookmaker_name
      - race_id
      title: RacingOddsBookmakerSnapshot
    RacingOddsSnapshotResponse:
      properties:
        event_id:
          type: string
          title: Event Id
        as_of_ts_ms:
          anyOf:
          - type: integer
          - type: 'null'
          title: As Of Ts Ms
        ttl_seconds:
          anyOf:
          - type: integer
          - type: 'null'
          title: Ttl Seconds
        items:
          items:
            $ref: '#/components/schemas/RacingOddsBookmakerSnapshot'
          type: array
          title: Items
        resume:
          type: string
          title: Resume
          description: Redis stream ID to resume from; pass as 'since' to /stream.
      type: object
      required:
      - event_id
      - resume
      title: RacingOddsSnapshotResponse
    ResultItem:
      properties:
        event_id:
          type: string
          title: Event Id
        status:
          type: string
          title: Status
          description: available|pending
        result:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Result
      type: object
      required:
      - event_id
      - status
      title: ResultItem
    ErrorResponse:
      type: object
      required:
      - detail
      properties:
        detail:
          description: Human-readable error detail. FastAPI may return a string or
            a validation-error object.
          oneOf:
          - type: string
          - type: object
          - type: array
            items:
              type: object
        code:
          type: string
          description: Optional stable error code when provided by the endpoint.
        request_id:
          type: string
          description: Optional request identifier for support/debugging.
    RateLimitResponse:
      allOf:
      - $ref: '#/components/schemas/ErrorResponse'
      description: Rate-limit response. Retry after the window or reduce polling frequency.
    OddsStreamDelta:
      properties:
        op:
          title: Op
          type: string
        odd:
          $ref: '#/components/schemas/OddLine'
      required:
      - op
      - odd
      title: OddsStreamDelta
      type: object
    OddsStreamEvent:
      properties:
        event_id:
          title: Event Id
          type: string
        resume:
          title: Resume
          type: string
        changes:
          items:
            $ref: '#/components/schemas/OddsStreamDelta'
          title: Changes
          type: array
      required:
      - event_id
      - resume
      - changes
      title: OddsStreamEvent
      type: object
    RacingOddsStreamDelta:
      properties:
        op:
          title: Op
          type: string
        bookmaker_name:
          title: Bookmaker Name
          type: string
        snapshot:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          default: null
          title: Snapshot
      required:
      - op
      - bookmaker_name
      title: RacingOddsStreamDelta
      type: object
    RacingOddsStreamEvent:
      properties:
        event_id:
          title: Event Id
          type: string
        resume:
          title: Resume
          type: string
        changes:
          items:
            $ref: '#/components/schemas/RacingOddsStreamDelta'
          title: Changes
          type: array
      required:
      - event_id
      - resume
      - changes
      title: RacingOddsStreamEvent
      type: object
    ApiRootResponse:
      type: object
      required:
      - name
      - version
      - openapi
      - reference
      properties:
        name:
          type: string
          example: Odds API
        version:
          type: string
          example: 1.0.0
        openapi:
          type: string
          example: /v1/openapi.json
        reference:
          type: string
          example: /v1/reference
    ApiIdentityResponse:
      type: object
      description: Authenticated API identity and enabled product capabilities.
      additionalProperties: true
      properties:
        method:
          type: string
          example: api_key
        client_id:
          type:
          - string
          - 'null'
        capabilities:
          type: object
          additionalProperties: true
        membership_tier:
          type:
          - integer
          - 'null'
    UsageResponse:
      type: object
      description: Quota and usage counters for the API key. New odds-api.net plans
        report API credits; legacy keys may still expose request-count fields.
      additionalProperties: true
      properties:
        period_start_utc:
          type:
          - string
          - 'null'
        period_end_utc:
          type:
          - string
          - 'null'
        plan:
          type:
          - string
          - 'null'
        pricing_model:
          type:
          - string
          - 'null'
        api_credits_used:
          type:
          - integer
          - 'null'
        api_credits_limit:
          type:
          - integer
          - 'null'
        used:
          type:
          - integer
          - 'null'
        limit:
          type:
          - integer
          - 'null'
        request_count:
          type:
          - integer
          - 'null'
        request_limit:
          type:
          - integer
          - 'null'
    LimitsResponse:
      type: object
      required:
      - responses
      - sse
      properties:
        responses:
          type: object
          required:
          - events_limit_max
          - odds_snapshot_limit_max
          - bets_snapshot_limit_max
          properties:
            events_limit_max:
              type: integer
              example: 1000
            odds_snapshot_limit_max:
              type: integer
              example: 10000
            bets_snapshot_limit_max:
              type: integer
              example: 20000
        sse:
          type: object
          required:
          - heartbeat_sec_min
          - heartbeat_sec_max
          - max_batch_default
          properties:
            heartbeat_sec_min:
              type: integer
              example: 5
            heartbeat_sec_max:
              type: integer
              example: 120
            max_batch_default:
              type: integer
              example: 500
        plan_id:
          type:
          - string
          - 'null'
        pricing_model:
          type:
          - string
          - 'null'
        billing_status:
          type:
          - string
          - 'null'
        quotas:
          type: object
          additionalProperties: true
        entitlements:
          type: object
          additionalProperties: true
        add_ons:
          type: object
          additionalProperties: true
        usage_unit:
          type:
          - string
          - 'null'
          example: api_credits
        overage_policy:
          type:
          - string
          - 'null'
          example: hard_cap
    StringListResponse:
      type: object
      required:
      - items
      properties:
        items:
          type: array
          items:
            type: string
    BookmakerCatalogItem:
      type: object
      required:
      - bookmaker
      - country_codes
      properties:
        bookmaker:
          type: string
          description: Canonical bookmaker identifier accepted by bookmaker filters.
          example: bet365
        country_codes:
          type: array
          items:
            type: string
          description: Country codes where this bookmaker is active, for example `AU`
            or `UK`.
          example:
          - AU
          - UK
    BookmakerCatalogResponse:
      type: object
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/BookmakerCatalogItem'
    BookmakerCountryCatalogItem:
      type: object
      required:
      - country_code
      - bookmakers
      properties:
        country_code:
          type: string
          example: AU
        country:
          type:
          - string
          - 'null'
          example: Australia
        bookmakers:
          type: array
          items:
            type: string
          description: Canonical bookmaker identifiers active for this country code.
    BookmakerCountriesCatalogResponse:
      type: object
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/BookmakerCountryCatalogItem'
    BetOpportunity:
      type: object
      description: A normalized betting opportunity. Strategy-specific fields may
        be present.
      additionalProperties: true
      properties:
        id:
          type: string
        strategy:
          type: string
          enum:
          - pos_ev
          - arbitrage
          - middles
          - freebets
          - pos_ev_special
        event_id:
          type:
          - string
          - 'null'
        bookmaker_name:
          type:
          - string
          - 'null'
        selection_key:
          type:
          - string
          - 'null'
        odds:
          type:
          - number
          - 'null'
        fair_odds:
          type:
          - number
          - 'null'
        ev:
          type:
          - number
          - 'null'
    BetsSnapshotResponse:
      type: object
      required:
      - resume
      - items
      properties:
        resume:
          type: string
          description: JSON string mapping each requested strategy to its stream resume
            ID.
        items:
          type: array
          items:
            $ref: '#/components/schemas/BetOpportunity'
    BetsStreamDelta:
      type: object
      required:
      - strategy
      - op
      - id
      properties:
        strategy:
          type: string
        op:
          type: string
          enum:
          - upsert
          - delete
        id:
          type: string
        doc:
          $ref: '#/components/schemas/BetOpportunity'
    BetsStreamEvent:
      type: object
      required:
      - resume
      - events
      properties:
        resume:
          type: string
        events:
          type: array
          items:
            $ref: '#/components/schemas/BetsStreamDelta'
    OddsHistoryStreamEvent:
      type: object
      required:
      - event_id
      - selection_key
      - resume
      - points
      properties:
        event_id:
          type: string
        selection_key:
          type: string
        resume:
          type: string
        points:
          type: array
          items:
            $ref: '#/components/schemas/OddsHistoryPoint'
    RacingEventsStreamChange:
      type: object
      required:
      - op
      - event_id
      properties:
        op:
          type: string
          enum:
          - upsert
          - remove
        event_id:
          type: string
        event:
          type:
          - object
          - 'null'
          additionalProperties: true
    RacingEventsStreamEvent:
      type: object
      required:
      - resume
      - changes
      properties:
        resume:
          type: string
        changes:
          type: array
          items:
            $ref: '#/components/schemas/RacingEventsStreamChange'
    StreamHeartbeat:
      type: object
      description: Heartbeat payload. A heartbeat confirms the stream is still open
        and carries no data.
      additionalProperties: false
    StreamResyncEvent:
      type: object
      description: Sent when a resume token is no longer available and the client
        should reload the snapshot.
      required:
      - reason
      properties:
        event_id:
          type:
          - string
          - 'null'
        selection_key:
          type:
          - string
          - 'null'
        resume:
          type:
          - string
          - 'null'
        reason:
          type: string
          example: trimmed
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Send your API key in this header on every request.
tags:
- name: Start here
  description: API identity, base URL, authentication, and reference links.
- name: Status
  description: Buyer-facing API availability, latency, stream health, and rate-limit
    health.
- name: Account
  description: Current API identity, usage counters, and contract limits.
- name: Catalog
  description: Supported sports, leagues, bookmakers, and approximate market coverage.
- name: Sports events
  description: Upcoming and live sports events plus event metadata.
- name: Sports odds
  description: Sports odds snapshots, line movement, Server-Sent Events, and WebSocket
    updates.
- name: Racing events
  description: Racing event discovery and live racing event updates.
- name: Racing odds
  description: Racing odds snapshots, home racing feeds, Server-Sent Events, and WebSocket
    updates.
- name: Betting opportunities
  description: Positive EV, arbitrage, middle, and bonus-bet opportunity feeds.
- name: Results
  description: Sports event result lookup.
servers:
- url: https://api.odds-api.net/v1
  description: Production V1 base URL. Set ODDS_API_BASE_URL to override it in SDKs
    and examples.
security: *id007
