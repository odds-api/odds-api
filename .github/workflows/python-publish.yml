name: publish-python

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Package version in sdks/python/pyproject.toml"
        required: true
        type: string
      publish:
        description: "Type publish to confirm uploading odds-api-client to PyPI"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build odds-api-client
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.package-version.outputs.package_version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read and verify package version
        id: package-version
        run: |
          set -euo pipefail
          PACKAGE_VERSION="$(python - <<'PY'
          import tomllib

          with open("sdks/python/pyproject.toml", "rb") as f:
              print(tomllib.load(f)["project"]["version"])
          PY
          )"
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "release" ]; then
            RELEASE_VERSION="${GITHUB_REF_NAME#v}"
            if [ "$RELEASE_VERSION" != "$PACKAGE_VERSION" ]; then
              echo "Release tag $GITHUB_REF_NAME does not match Python package version $PACKAGE_VERSION" >&2
              exit 1
            fi
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.publish }}" != "publish" ]; then
              echo "Manual publish requires publish=publish" >&2
              exit 1
            fi
            if [ "${{ inputs.version }}" != "$PACKAGE_VERSION" ]; then
              echo "Manual version ${{ inputs.version }} does not match Python package version $PACKAGE_VERSION" >&2
              exit 1
            fi
          fi

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Build sdist and wheel
        run: |
          set -euo pipefail
          rm -rf dist build *.egg-info
          python -m build
        working-directory: sdks/python

      - name: Check package metadata
        run: python -m twine check dist/*
        working-directory: sdks/python

      - name: Smoke install built wheel
        run: |
          set -euo pipefail
          python -m venv /tmp/odds-api-client-install
          WHEEL="$(ls sdks/python/dist/*.whl | head -n 1)"
          /tmp/odds-api-client-install/bin/python -m pip install "$WHEEL"
          /tmp/odds-api-client-install/bin/python - <<PY
          from odds_api import OddsApiClient, __version__

          assert __version__ == "${{ steps.package-version.outputs.package_version }}"
          assert OddsApiClient(base_url="https://api.odds-api.net/v1").base_url == "https://api.odds-api.net/v1"
          print(f"odds-api-client {__version__} import ok")
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: odds-api-client-dist
          path: sdks/python/dist/*
          if-no-files-found: error

  publish:
    name: Publish odds-api-client to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/odds-api-client/${{ needs.build.outputs.package_version }}/
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: odds-api-client-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          print-hash: true
