name: ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm install
      - run: npm run build
      - run: npm test
      - run: npm run lint:openapi
      - run: PYTHONPATH=sdks/python/src python -m unittest discover -s sdks/python/tests
